version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: mintcarbon-db
    environment:
      POSTGRES_USER: mintcarbon
      POSTGRES_PASSWORD: mintcarbon_dev
      POSTGRES_DB: mintcarbon
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mintcarbon"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mintcarbon-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: mintcarbon-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: mintcarbon
      MINIO_ROOT_PASSWORD: mintcarbon_dev
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
  miniodata:
